<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>あなたの名前</h1>
      <p class="subtitle">Researcher / Student / Creator</p>
      <nav>
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#works">Works</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="about">
      <h2>About</h2>
      <p>
        ここに自己紹介を書きます。専門、興味、所属、やっていることなど。
      </p>
    </section>

    <section id="research">
      <h2>Research</h2>
      <p>
        研究テーマや今取り組んでいることを書きます。
      </p>
    </section>

    <section id="works">
      <h2>Works</h2>
      <p>
        論文、発表資料、ノート、制作物などへのリンクを置きます。
      </p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>
        Email: yourname@example.com
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Your Name</p>
    </div>
  </footer>
</body>
</html>
